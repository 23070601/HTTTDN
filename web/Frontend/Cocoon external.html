<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocoon Vietnam — Cửa hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8; --bg-light: #faf8f3; --fg: #344e41; --border: #e8e8e8;
  --surface: #f9f7f3; --primary: #3a5a40; --primary-fg: #fff; --secondary: #588157;
  --accent-soft: #e3ecd9; --leaf: #a3b18a; --danger: #b5544f; --danger-soft: #f5e6e3;
  --warning: #a97a1f; --warning-soft: #f4e8cc; --success: #4f7a56; --success-soft: #e4efe5;
  --gold: #a68643; --gold-soft: #efe4c8; --muted: #888; --card: #faf8f3;
  --font-body: 'DM Sans', sans-serif; --font-heading: 'PT Serif', serif;
  --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--fg); font-size: 14px; }

/* HEADER */
header { background: var(--bg-light); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 24px; }
.logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.logo-icon { width: 36px; height: 36px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text { font-family: var(--font-heading); font-size: 18px; color: var(--fg); }
nav { display: flex; gap: 4px; flex: 1; }
.nav-link { padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.nav-link:hover, .nav-link.active { background: var(--accent-soft); color: var(--primary); }
.header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.cart-btn { position: relative; width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--accent-soft); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); border: none; }
.cart-count { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: var(--danger); border-radius: 50%; font-size: 10px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #2d4832; }
.btn-secondary { background: var(--surface); color: var(--fg); border: 1px solid var(--border); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-xs { padding: 5px 10px; font-size: 11px; }

/* MAIN */
main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

/* HERO */
.hero { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border-radius: var(--radius-lg); padding: 48px; color: #fff; margin-bottom: 40px; position: relative; overflow: hidden; }
.hero::before { content: '🌿'; position: absolute; right: 40px; top: 50%; transform: translateY(-50%); font-size: 120px; opacity: 0.15; }
.hero h1 { font-family: var(--font-heading); font-size: 36px; margin-bottom: 12px; }
.hero p { font-size: 16px; opacity: 0.85; margin-bottom: 24px; max-width: 500px; }
.hero-btns { display: flex; gap: 12px; }
.hero-btn { padding: 12px 24px; border-radius: var(--radius-sm); font-family: var(--font-body); font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: all 0.15s; }
.hero-btn-primary { background: #fff; color: var(--primary); }
.hero-btn-primary:hover { background: #f0f8f0; }
.hero-btn-outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.5); }
.hero-btn-outline:hover { background: rgba(255,255,255,0.1); }

/* PRODUCT GRID */
.section-title { font-family: var(--font-heading); font-size: 22px; color: var(--fg); margin-bottom: 20px; }
.product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
@media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .product-grid { grid-template-columns: 1fr; } }

.product-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
.product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.product-img { height: 180px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 48px; }
.product-body { padding: 14px; }
.product-cat { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.product-name { font-family: var(--font-heading); font-size: 14px; line-height: 1.4; margin-bottom: 8px; min-height: 40px; }
.product-price { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
.product-footer { display: flex; align-items: center; gap: 6px; }
.product-stock { font-size: 11px; color: var(--muted); flex: 1; }
.badge { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-green { background: var(--success-soft); color: var(--success); }
.badge-red { background: var(--danger-soft); color: var(--danger); }
.badge-gold { background: var(--gold-soft); color: var(--gold); }

/* FILTER */
.filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; }
input, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-light); color: var(--fg); font-family: var(--font-body); font-size: 13px; outline: none; }
input:focus, select:focus { border-color: var(--primary); }
.search-wrap input { padding-left: 32px; }
.filter-select { width: auto; min-width: 120px; }

/* CART DRAWER */
#cart-drawer { position: fixed; right: 0; top: 0; width: 380px; height: 100vh; background: var(--bg-light); border-left: 1px solid var(--border); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; box-shadow: -8px 0 32px rgba(0,0,0,0.1); }
#cart-drawer.open { transform: translateX(0); }
.drawer-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.drawer-title { font-family: var(--font-heading); font-size: 18px; }
.drawer-close { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; color: var(--muted); }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px; }
.cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.cart-item:last-child { border-bottom: none; }
.cart-item-img { width: 60px; height: 60px; background: var(--accent-soft); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
.cart-item-price { font-size: 13px; color: var(--primary); font-weight: 600; }
.qty-control { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.qty-btn { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--fg); }
.qty-val { font-size: 13px; min-width: 24px; text-align: center; }
.drawer-footer { padding: 16px; border-top: 1px solid var(--border); }
.cart-total { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: 16px; }

/* MODAL */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--card); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: var(--font-heading); font-size: 18px; }
.modal-close { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }

/* TOAST */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 400; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 16px; border-radius: var(--radius); background: #314436; color: #fff; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; max-width: 320px; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
.empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 32px; }
.page-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-light); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; }
.page-btn:hover { background: var(--accent-soft); color: var(--primary); }
.page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* LOYALTY PAGE */
.loyalty-card { background: linear-gradient(135deg, #3a5a40, #588157); border-radius: var(--radius-lg); padding: 32px; color: #fff; margin-bottom: 24px; }
.loyalty-points { font-family: var(--font-heading); font-size: 48px; margin: 8px 0; }
.loyalty-tier { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 13px; }

/* ORDERS PAGE */
.order-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; }
.order-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.order-number { font-family: var(--font-heading); font-size: 15px; }
.order-items { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
.order-footer { display: flex; align-items: center; justify-content: space-between; }

/* PROFILE PAGE */
.profile-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
.profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 28px; color: var(--primary); font-weight: 700; margin: 0 auto 16px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
.info-item span { font-size: 14px; }

/* LOGIN MODAL */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Misc */
.text-muted { color: var(--muted); }
.fw-600 { font-weight: 600; }
.text-primary { color: var(--primary); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="showPage('home')">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">Cocoon Vietnam</div>
    </div>
    <nav>
      <span class="nav-link active" data-page="home">Trang chủ</span>
      <span class="nav-link" data-page="catalog">Sản phẩm</span>
      <span class="nav-link" data-page="orders">Đơn hàng</span>
      <span class="nav-link" data-page="loyalty">Loyalty & Rewards</span>
    </nav>
    <div class="header-right">
      <button class="cart-btn" onclick="toggleCart()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </button>
      <div id="auth-area">
        <button class="btn btn-primary btn-sm" onclick="openAuthModal()">Đăng nhập</button>
      </div>
      <div id="user-area" style="display:none">
        <div class="logo" onclick="showPage('profile')" style="gap:8px">
          <div class="logo-icon" style="width:32px;height:32px;font-size:14px;font-weight:700;font-family:var(--font-heading);color:var(--primary)" id="user-avatar">?</div>
          <span style="font-size:13px;font-weight:500" id="user-name-disp">Khách</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="doLogout()" style="margin-left:8px">Đăng xuất</button>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main id="main-content">
  <div class="loading"><div class="spinner"></div></div>
</main>

<!-- CART DRAWER -->
<div id="cart-drawer">
  <div class="drawer-header">
    <div class="drawer-title">Giỏ hàng</div>
    <button class="drawer-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="drawer-body" id="cart-body">
    <div class="empty-state"><div class="emoji">🛒</div><div>Giỏ hàng trống</div></div>
  </div>
  <div class="drawer-footer">
    <div class="cart-total"><span>Tổng tiền:</span><span id="cart-total-val">0 ₫</span></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="goCheckout()">Thanh toán →</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let API_BASE = 'http://localhost:3000';
let token = localStorage.getItem('cocoon_customer_token');
let currentUser = null;
let cart = JSON.parse(localStorage.getItem('cocoon_cart') || '[]');
let currentPage = 'home';

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
async function api(path, options = {}) {
  const url = `${API_BASE}/api${path}`;
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(url, { ...options, headers: { ...headers, ...options.headers } });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  } catch(e) {
    return null;
  }
}
const apiGet  = (path, q = {}) => { const qs = new URLSearchParams(q).toString(); return api(path + (qs ? '?' + qs : '')); };
const apiPost = (path, body) => api(path, { method: 'POST', body: JSON.stringify(body) });

// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function fmtVND(n) { return Number(n || 0).toLocaleString('vi-VN') + ' ₫'; }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('vi-VN') : '—'; }
function initials(name) { return name ? name.split(' ').slice(-2).map(w => w[0]).join('').toUpperCase() : '?'; }

function setContent(html) { document.getElementById('main-content').innerHTML = html; }
function openModal(title, body, footer = '') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none';
}

function productEmoji(name) {
  if (!name) return '🌿';
  const n = name.toLowerCase();
  if (n.includes('dầu') || n.includes('oil')) return '💧';
  if (n.includes('kem') || n.includes('cream')) return '🧴';
  if (n.includes('son') || n.includes('lip')) return '💄';
  if (n.includes('mặt') || n.includes('face')) return '✨';
  if (n.includes('tóc') || n.includes('hair')) return '💆';
  if (n.includes('body')) return '🫧';
  if (n.includes('cà phê') || n.includes('coffee')) return '☕';
  return '🌿';
}

function deliveryBadge(s) {
  const map = { Pending: ['badge-gold','Chờ xử lý'], Processing: ['badge-green','Đang xử lý'], Shipped: ['badge-green','Đang giao'], Delivered: ['badge-green','Đã giao'], Cancelled: ['badge-red','Đã hủy'], Returned: ['badge-red','Đã trả'] };
  const [cls, label] = map[s] || ['', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ══════════════════════════════════════════════════════════
//  CART
// ══════════════════════════════════════════════════════════
function saveCart() { localStorage.setItem('cocoon_cart', JSON.stringify(cart)); updateCartUI(); }

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const countEl = document.getElementById('cart-count');
  if (count > 0) { countEl.style.display = 'flex'; countEl.textContent = count; }
  else { countEl.style.display = 'none'; }
  document.getElementById('cart-total-val').textContent = fmtVND(total);

  const bodyEl = document.getElementById('cart-body');
  if (!cart.length) {
    bodyEl.innerHTML = '<div class="empty-state"><div class="emoji">🛒</div><div>Giỏ hàng trống</div></div>';
    return;
  }
  bodyEl.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-img">${productEmoji(item.name)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmtVND(item.price)}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-val">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
          <button class="qty-btn" onclick="removeFromCart(${i})" style="margin-left:auto;color:var(--danger)">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(product) {
  const existing = cart.findIndex(i => i.id === product.product_id);
  if (existing >= 0) cart[existing].quantity++;
  else cart.push({ id: product.product_id, name: product.product_name, price: product.selling_price, quantity: 1, sku: product.sku });
  saveCart();
  toast(`Đã thêm "${product.product_name}" vào giỏ hàng`);
}
function changeQty(idx, delta) {
  cart[idx].quantity += delta;
  if (cart[idx].quantity <= 0) cart.splice(idx, 1);
  saveCart();
}
function removeFromCart(idx) { cart.splice(idx, 1); saveCart(); }
function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }

// ══════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════
function openAuthModal(tab = 'login') {
  openModal('Tài khoản Cocoon Vietnam', `
    <div class="tab-bar">
      <div class="tab ${tab==='login'?'active':''}" onclick="switchAuthTab('login')">Đăng nhập</div>
      <div class="tab ${tab==='register'?'active':''}" onclick="switchAuthTab('register')">Đăng ký</div>
    </div>
    <div id="auth-form">
      ${tab === 'login' ? loginForm() : registerForm()}
    </div>
  `, `
    <div id="auth-error" style="color:var(--danger);font-size:13px;flex:1"></div>
    <button class="btn btn-secondary btn-sm" onclick="closeModal()">Hủy</button>
    <button class="btn btn-primary btn-sm" id="auth-btn" onclick="submitAuth('${tab}')">
      ${tab === 'login' ? 'Đăng nhập' : 'Đăng ký'}
    </button>
  `);
}
function switchAuthTab(tab) {
  document.getElementById('auth-form').innerHTML = tab === 'login' ? loginForm() : registerForm();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(tab === 'login' ? 'Đăng nhập' : 'Đăng ký')));
  const btn = document.getElementById('auth-btn');
  btn.textContent = tab === 'login' ? 'Đăng nhập' : 'Đăng ký';
  btn.onclick = () => submitAuth(tab);
}
function loginForm() {
  return `
    <div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="email@example.com"></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
    <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--muted)">
      Chưa có tài khoản? <a href="#" onclick="switchAuthTab('register');return false">Đăng ký ngay</a>
    </div>
  `;
}
function registerForm() {
  return `
    <div class="grid-2">
      <div class="form-group" style="grid-column:1/-1"><label>Họ tên *</label><input id="auth-name" placeholder="Nguyễn Văn A"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="auth-email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Điện thoại</label><input id="auth-phone" placeholder="0901234567"></div>
    </div>
    <div class="form-group"><label>Mật khẩu *</label><input type="password" id="auth-pass" placeholder="Ít nhất 6 ký tự"></div>
    <div class="form-group"><label>Giới tính</label>
      <select id="auth-gender"><option value="Female">Nữ</option><option value="Male">Nam</option><option value="Other">Khác</option></select>
    </div>
  `;
}
async function submitAuth(tab) {
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  const email = document.getElementById('auth-email')?.value;
  const pass = document.getElementById('auth-pass')?.value;

  if (tab === 'login') {
    const res = await apiPost('/auth/login', { email, password: pass });
    if (!res?.ok) { errEl.textContent = res?.data?.message || 'Đăng nhập thất bại'; return; }
    token = res.data.data.access_token;
    localStorage.setItem('cocoon_customer_token', token);
    currentUser = res.data.data.user;
    updateUserUI();
    closeModal();
    toast('Đăng nhập thành công! Xin chào ' + currentUser.full_name);
  } else {
    const name = document.getElementById('auth-name')?.value;
    const phone = document.getElementById('auth-phone')?.value;
    const gender = document.getElementById('auth-gender')?.value;
    const res = await apiPost('/customers', { full_name: name, email, phone_number: phone, gender, segment: 'New' });
    if (!res?.ok) { errEl.textContent = res?.data?.message || 'Đăng ký thất bại'; return; }
    toast('Đăng ký thành công! Vui lòng đăng nhập.');
    switchAuthTab('login');
  }
}
function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('cocoon_customer_token');
  document.getElementById('auth-area').style.display = 'block';
  document.getElementById('user-area').style.display = 'none';
  toast('Đã đăng xuất');
  showPage('home');
}
function updateUserUI() {
  if (currentUser) {
    document.getElementById('auth-area').style.display = 'none';
    document.getElementById('user-area').style.display = 'flex';
    document.getElementById('user-avatar').textContent = initials(currentUser.full_name);
    document.getElementById('user-name-disp').textContent = currentUser.full_name.split(' ').slice(-1)[0];
  }
}

let catalogPage = 1, catalogSearch = '', catalogCat = '';
async function loadCatalog(page = 1) {
  catalogPage = page;
  const q = { page, limit: 12, status: 'Available', visibility: 'Visible' };
  if (catalogSearch) q.search = catalogSearch;
  if (catalogCat) q.category_id = catalogCat;
  const [prodRes, catRes] = await Promise.all([apiGet('/products', q), apiGet('/categories')]);
  const products = prodRes?.data?.data || [];
  const pagination = prodRes?.data?.pagination;
  const cats = catRes?.data?.data || [];

  setContent(`
    <div class="filter-bar">
      <div class="search-wrap" style="flex:1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Tìm sản phẩm..." oninput="catalogSearch=this.value;loadCatalog()" value="${catalogSearch}">
      </div>
      <select class="filter-select" onchange="catalogCat=this.value;loadCatalog()">
        <option value="">Tất cả danh mục</option>
        ${cats.map(c => `<option value="${c.category_id}" ${catalogCat==c.category_id?'selected':''}>${c.category_name}</option>`).join('')}
      </select>
    </div>
    ${products.length === 0
      ? '<div class="empty-state"><div class="emoji">🔍</div><div>Không tìm thấy sản phẩm</div></div>'
      : `<div class="product-grid">${products.map(p => productCard(p)).join('')}</div>`
    }
    ${paginationHTML(pagination)}
  `);
}

function paginationHTML(pagination) {
  if (!pagination || pagination.pages <= 1) return '';
  const { page, pages } = pagination;
  let btns = '';
  for (let i = 1; i <= pages; i++) {
    btns += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadCatalog(${i})">${i}</button>`;
  }
  return `<div class="pagination">${btns}</div>`;
}

async function submitCheckout() {
  const address = document.getElementById('co-address').value;
  if (!address) { toast('Vui lòng nhập địa chỉ giao hàng', 'error'); return; }

  // Find or create customer_id from current user email
  const custSearch = await apiGet('/customers', { search: currentUser.email, limit: 1 });
  let customer_id = custSearch?.data?.data?.[0]?.customer_id;

  if (!customer_id) {
    // Create customer
    const custRes = await apiPost('/customers', { full_name: currentUser.full_name, email: currentUser.email, segment: 'New' });
    customer_id = custRes?.data?.data?.customer_id;
  }

  if (!customer_id) { toast('Không tìm thấy thông tin khách hàng', 'error'); return; }

  const body = {
    customer_id,
    sales_channel: 'Online',
    payment_method: document.getElementById('co-payment').value,
    shipping_address: address,
    city: document.getElementById('co-city').value || null,
    shipping_fee: 30000,
    note: document.getElementById('co-note').value || null,
    items: cart.map(i => ({ product_id: i.id, quantity: i.quantity, unit_price: i.price })),
  };

  const res = await apiPost('/orders', body);
  if (res?.ok) {
    cart = []; saveCart();
    setContent(`
      <div style="max-width:500px;margin:60px auto;text-align:center">
        <div style="font-size:72px;margin-bottom:24px">🎉</div>
        <h2 style="font-family:var(--font-heading);font-size:28px;margin-bottom:12px">Đặt hàng thành công!</h2>
        <p style="color:var(--muted);font-size:15px;margin-bottom:8px">Mã đơn hàng của bạn:</p>
        <div style="font-family:var(--font-heading);font-size:20px;color:var(--primary);background:var(--accent-soft);padding:12px 24px;border-radius:var(--radius);display:inline-block;margin-bottom:24px">${res.data.data.order_number}</div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Cảm ơn bạn đã tin tưởng Cocoon Vietnam! Chúng tôi sẽ liên hệ xác nhận đơn hàng sớm nhất.</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button class="btn btn-primary" onclick="showPage('orders')">Xem đơn hàng</button>
          <button class="btn btn-secondary" onclick="showPage('home')">Tiếp tục mua sắm</button>

      </div>

  } else {
    toast(res?.data?.message || 'Đặt hàng thất bại', 'error');
  }
}

function redeemPoints(pts) {
  toast(`Tính năng đổi ${pts} điểm sẽ sớm ra mắt! 🎁`);
}

// ══════════════════════════════════════════════════════════
//  PROFILE
// ══════════════════════════════════════════════════════════
async function loadProfile() {
  if (!currentUser) { setContent(`<div class="empty-state"><div class="emoji">🔒</div><div style="margin-bottom:16px">Vui lòng đăng nhập</div><button class="btn btn-primary" onclick="openAuthModal()">Đăng nhập</button></div>`); return; }

  setContent(`
    <div style="max-width:600px">
      <div class="profile-card">
        <div class="profile-avatar">${initials(currentUser.full_name)}</div>
        <h2 style="font-family:var(--font-heading);font-size:20px;text-align:center;margin-bottom:4px">${currentUser.full_name}</h2>
        <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px">${currentUser.email}</div>
        <div class="info-grid">
          <div class="info-item"><label>Vai trò hệ thống</label><span>${currentUser.role}</span></div>
          <div class="info-item"><label>Văn phòng</label><span>${currentUser.office || '—'}</span></div>
        </div>
      </div>
      <div class="profile-card" style="text-align:center">
        <div style="color:var(--muted);font-size:13px;margin-bottom:16px">Bạn đang đăng nhập vào hệ thống nhân viên. Để mua sắm với tư cách khách hàng, vui lòng sử dụng tài khoản khách hàng riêng.</div>
        <button class="btn btn-danger btn-sm" onclick="doLogout()">Đăng xuất</button>
      </div>
    </div>
  `);
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
document.querySelectorAll('.nav-link[data-page]').forEach(el => {
  el.addEventListener('click', () => showPage(el.dataset.page));
});

if (token) {
  apiGet('/auth/me').then(res => {
    if (res?.ok) { currentUser = res.data.data; updateUserUI(); }
    else { token = null; localStorage.removeItem('cocoon_customer_token'); }
    updateCartUI();
    loadHome();
  });
} else {
  updateCartUI();
  loadHome();
}
</script>
